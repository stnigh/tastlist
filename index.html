<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>悬浮任务清单</title>
    <style>
        /* 完全透明背景 - 无白边 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: transparent !important;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent !important;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 8px;
        }

        /* 主卡片 - 可拖拽的悬浮窗口 */
        .floating-card {
            width: 380px;
            max-width: 90vw;
            background: rgba(20, 22, 27, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
            color: #f0f0f0;
            cursor: default;
        }

        /* 拖拽区域 */
        .drag-area {
            padding: 16px 20px 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            cursor: move;
            user-select: none;
        }

        .drag-area h1 {
            font-size: 1.2rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .drag-area h1 span {
            font-size: 1rem;
            opacity: 0.6;
        }

        .drag-hint {
            font-size: 0.6rem;
            opacity: 0.4;
            margin-top: 6px;
        }

        /* 添加任务区域 */
        .add-area {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .task-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .task-input-row input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.85rem;
            color: white;
            outline: none;
        }

        .task-input-row input:focus {
            border-color: #6c5ce7;
        }

        .time-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .time-input {
            flex: 1;
        }

        .time-input label {
            font-size: 0.6rem;
            opacity: 0.6;
            display: block;
            margin-bottom: 4px;
        }

        .time-input input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 0.7rem;
            color: white;
            outline: none;
        }

        .add-btn {
            width: 100%;
            background: #6c5ce7;
            border: none;
            border-radius: 14px;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.15s;
        }

        .add-btn:hover {
            background: #5b4bc4;
        }

        /* 任务列表 */
        .tasks-area {
            max-height: 400px;
            overflow-y: auto;
            padding: 12px 16px 20px;
        }

        .tasks-area::-webkit-scrollbar {
            width: 4px;
        }

        .tasks-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .tasks-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: 0.1s;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }

        .checkbox:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .checkbox.checked {
            background: #4caf50;
        }

        .checkbox.checked::after {
            content: "✓";
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-word;
            margin-bottom: 6px;
        }

        .task-times {
            display: flex;
            gap: 12px;
            font-size: 0.6rem;
            opacity: 0.7;
        }

        .task-times span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.5;
            font-size: 0.8rem;
        }

        .footer {
            padding: 10px 16px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.55rem;
            text-align: center;
            opacity: 0.4;
        }
    </style>
</head>
<body>
<div class="floating-card" id="dragCard">
    <div class="drag-area" id="dragHandle">
        <h1>📋 任务清单 <span>◻</span></h1>
        <div class="drag-hint">按住此处拖动窗口</div>
    </div>

    <div class="add-area">
        <div class="task-input-row">
            <input type="text" id="taskTitle" placeholder="写周报, 买咖啡..." autocomplete="off">
        </div>
        <div class="time-row">
            <div class="time-input">
                <label>⏰ 截止</label>
                <input type="datetime-local" id="deadline">
            </div>
            <div class="time-input">
                <label>📅 计划</label>
                <input type="datetime-local" id="planned">
            </div>
        </div>
        <button class="add-btn" id="addBtn">+ 添加任务</button>
    </div>

    <div class="tasks-area" id="tasksList">
        <div class="empty">✨ 暂无任务，点击上方添加</div>
    </div>
    <div class="footer">✔ 点击方框 → 任务消失</div>
</div>

<script>
    const STORAGE_KEY = 'floating_todo';
    let tasks = [];

    const taskTitle = document.getElementById('taskTitle');
    const deadline = document.getElementById('deadline');
    const planned = document.getElementById('planned');
    const addBtn = document.getElementById('addBtn');
    const tasksList = document.getElementById('tasksList');

    // 设置默认时间
    function setDefaultTimes() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(15, 0, 0, 0);
        const dayAfter = new Date(now);
        dayAfter.setDate(dayAfter.getDate() + 2);
        dayAfter.setHours(15, 0, 0, 0);

        if (!deadline.value) deadline.value = formatDateTimeLocal(dayAfter);
        if (!planned.value) planned.value = formatDateTimeLocal(tomorrow);
    }

    function formatDateTimeLocal(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const h = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        return `${y}-${m}-${d}T${h}:${min}`;
    }

    function formatDisplay(dateStr) {
        if (!dateStr) return '未设置';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        } catch(e) {
            return dateStr;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function saveTasks() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function loadTasks() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                tasks = JSON.parse(stored);
            } catch(e) { tasks = []; }
        }
        if (tasks.length === 0) {
            tasks = [
                { id: 'demo1', title: '✨ 每周团队会议', deadline: getFutureDate(2, 14), planned: getFutureDate(1, 15) },
                { id: 'demo2', title: '🎨 设计透明主题', deadline: getFutureDate(5, 14), planned: getFutureDate(3, 15) }
            ];
        }
        renderTasks();
    }

    function getFutureDate(daysLater, hour) {
        const d = new Date();
        d.setDate(d.getDate() + daysLater);
        d.setHours(hour, 0, 0, 0);
        return d.toISOString().slice(0, 16);
    }

    function addTask() {
        const title = taskTitle.value.trim();
        if (!title) {
            alert('请输入任务内容');
            return;
        }
        tasks.push({
            id: Date.now().toString(),
            title: title,
            deadline: deadline.value || null,
            planned: planned.value || null
        });
        saveTasks();
        renderTasks();
        taskTitle.value = '';
        taskTitle.focus();
    }

    function completeTask(id) {
        tasks = tasks.filter(t => t.id != id);
        saveTasks();
        renderTasks();
    }

    function renderTasks() {
        if (tasks.length === 0) {
            tasksList.innerHTML = '<div class="empty">🎯 完成啦！添加新任务~</div>';
            return;
        }
        let html = '';
        for (let t of tasks) {
            html += `
                <div class="task-item">
                    <div class="checkbox" onclick="window.completeTask('${t.id}')"></div>
                    <div class="task-info">
                        <div class="task-title">${escapeHtml(t.title)}</div>
                        <div class="task-times">
                            <span>📅 截止 ${formatDisplay(t.deadline)}</span>
                            <span>🎯 计划 ${formatDisplay(t.planned)}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        tasksList.innerHTML = html;
    }

    // 挂载全局函数
    window.completeTask = completeTask;
    window.addTask = addTask;

    // 拖拽功能
    function initDrag() {
        const card = document.getElementById('dragCard');
        const handle = document.getElementById('dragHandle');
        let isDragging = false;
        let offsetX, offsetY;

        handle.addEventListener('mousedown', (e) => {
            if (e.target.closest('input') || e.target.closest('button')) return;
            isDragging = true;
            offsetX = e.clientX - card.offsetLeft;
            offsetY = e.clientY - card.offsetTop;
            card.style.position = 'relative';
            card.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            card.style.position = 'fixed';
            card.style.left = (e.clientX - offsetX) + 'px';
            card.style.top = (e.clientY - offsetY) + 'px';
            card.style.margin = '0';
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            card.style.cursor = '';
        });
    }

    addBtn.addEventListener('click', addTask);
    taskTitle.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });

    setDefaultTimes();
    loadTasks();
    initDrag();
</script>
</body>
</html>
